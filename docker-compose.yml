services:
  db:
    image: mysql:8.0.41
    command: mysqld --default_authentication_plugin=mysql_native_password
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: ${SENHA_BD_BOOKSTORE}
      MYSQL_USER: ${MYSQL_USER_DOCKER_BOOKSTORE}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD_DOCKER_BOOKSTORE}
      MYSQL_DATABASE: ${MYSQL_DATABASE_BOOKSTORE}
    ports:
      - "3308:3306"
    expose:
      - 3306
    networks:
      - erudio-network
  bookstore-api:
    image: ${DOCKERHUB_USER}/bookstore-api
    restart: always
    build: ./Bookstore-api # Se quiser que de build diretamente do docker hub, REMOVA essa linha
    working_dir: /Bookstore-api
    environment:
      TZ: America/Sao_Paulo
      SPRING.DATASOURCE.URL: jdbc:mysql://db:3306/${MYSQL_DATABASE_BOOKSTORE}?useTimezone=true&serverTimezone=UTC
      SPRING.DATASOURCE.USERNAME: root
      SPRING.DATASOURCE.PASSWORD: ${SENHA_BD_BOOKSTORE}
    # REMOVIDO: command: mvn spring-boot:run (Deixe o ENTRYPOINT do Dockerfile agir)
    #command: mvn spring-boot:run
    ports:
      - 80:80
    networks:
      - erudio-network
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - partainer_data:/data

volumes:
  partainer_data:

networks: 
    erudio-network:
        driver: bridge