services:
  db:
    image: mysql:8.0.41
    command: mysqld --default_authentication_plugin=mysql_native_password
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: "SuaSenhaDoBanco"
      MYSQL_USER: docker
      MYSQL_PASSWORD: admin123
      MYSQL_DATABASE: SEUBANCODEDADOS
    ports:
      - "3308:3306"
    expose:
      - 3306
    networks:
      - erudio-network
  bookstore-api:
    image: SeuPerfilDoDockerDesktop/bookstore-api
    restart: always
    build: ./Bookstore-api
    working_dir: /Bookstore-api
    environment:
      TZ: America/Sao_Paulo
      SPRING.DATASOURCE.URL: jdbc:mysql://db:3306/SEUBANCODEDADOS?useTimezone=true&serverTimezone=UTC
      SPRING.DATASOURCE.USERNAME: root
      SPRING.DATASOURCE.PASSWORD: "SuaSenhaDoBanco"
    command: mvn spring-boot:run
    ports:
      - 80:80
    depends_on:
      - db
    networks:
      - erudio-network      
networks: 
    erudio-network:
        driver: bridge