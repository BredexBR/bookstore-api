server:
  port: 8888
file:
  upload-dir: /home/runner/work/bookstore-api/UploadDir
cors:
  originPatterns: http://localhost:8080,http://localhost:3000,https://www.erudio.com.br
spring:
  application:
    name: Bookstore-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-test-query: SELECT 1
      max-lifetime: 600000 # 10 minutos (Evita que o Hikari segure conexões mortas)
      maximum-pool-size: 5 # Reduz o pool para testes para não sobrecarregar o container
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
  security:
    jwt:
      token:
        secret-key: ${JWT_TOKEN_SECRET_KEY_BOOKSTORE}
        expire-lenght: 3600000
    mail:
      host: smtp.gmail.com
      port: 587
      username: ${EMAIL_USERNAME}
      password: ${EMAIL_PASSWORD}
      properties:
        mail.smtp.auth: true
        mail.smtp.starttls.enabled: true
        mail.smtp.starttls.required: true
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215 MB
  flyway:
    enabled: true
logging:
  level:
    root: INFO
    # root: WARN
    # br.com.erudio: DEBUG
spring-doc:
  paths-to-match:
    - /auth/**
    - /api/**/v1/**
  swagger-ui:
    use-root-path: true